<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Acumon-style mark: three large rounded black squares.
       Top row: one square on the left, one on the right.
       Bottom row: one square centred between the two above (straddling the L/R halves). -->
  <g fill="#000">
    <rect x="2"  y="2"  width="12" height="12" rx="2.5" />
    <rect x="18" y="2"  width="12" height="12" rx="2.5" />
    <rect x="10" y="18" width="12" height="12" rx="2.5" />
  </g>
</svg>
